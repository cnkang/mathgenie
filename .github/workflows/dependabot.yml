name: 🤖 Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize]

# Only run on Dependabot PRs
concurrency:
  group: dependabot-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.29.2"

jobs:
  # Job 1: Dependabot PR Analysis
  dependabot-analysis:
    name: 🔍 Dependabot Analysis
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'app/dependabot'
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write

    outputs:
      auto_merge: ${{ steps.analysis.outputs.auto_merge }}
      update_type: ${{ steps.analysis.outputs.update_type }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🧾 Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-commit-verification: true

      - name: 🔍 Analyze Dependabot PR
        id: analysis
        uses: actions/github-script@v8
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          PACKAGE_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          SECURITY_SEVERITY: ${{ steps.metadata.outputs.security-advisory-severity }}
          SECURITY_ID: ${{ steps.metadata.outputs.security-advisory-id }}
          ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        with:
          script: |
            const pr = context.payload.pull_request;

            const updateTypeRaw = process.env.UPDATE_TYPE || 'unknown';
            const dependencyType = process.env.DEPENDENCY_TYPE || 'unknown';
            const dependencyNames = process.env.PACKAGE_NAMES || 'unknown';
            const securitySeverity = process.env.SECURITY_SEVERITY || '';
            const ecosystem = process.env.ECOSYSTEM || 'unknown';

            const updateType = updateTypeRaw.startsWith('version-update:semver-')
              ? updateTypeRaw.replace('version-update:semver-', '')
              : (updateTypeRaw || 'unknown');

            const isDevDependency = dependencyType.includes('development');
            const titleLower = (pr.title || '').toLowerCase();

            let autoMerge = false;
            if (securitySeverity) {
              // Only auto-merge low or moderate severity security updates without breaking changes
              const severityLower = securitySeverity.toLowerCase();
              if (
                (severityLower === 'low' || severityLower === 'moderate') &&
                !titleLower.includes('breaking')
              ) {
                autoMerge = true;
              }
              // For high or critical severity, require manual review (do not auto-merge)
            } else if (updateType === 'patch') {
              autoMerge = true;
            } else if (updateType === 'minor' && isDevDependency) {
              autoMerge = true;
            } else if (updateType === 'minor' && !titleLower.includes('breaking')) {
              autoMerge = true;
            }

            let breakingRisk = 'Low';
            if (securitySeverity) {
              breakingRisk = 'Security';
            } else if (updateType === 'major') {
              breakingRisk = 'High';
            } else if (updateType === 'minor' && !isDevDependency) {
              breakingRisk = 'Medium';
            }

            const labels = ['dependencies', `${updateType}-update`];
            if (isDevDependency) labels.push('dev-dependency');
            if (securitySeverity) labels.push('security-update');
            if (breakingRisk === 'High') labels.push('breaking-change-risk');

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels
            });

            const commentLines = [
              '## 🤖 Dependabot PR Analysis',
              `- **Ecosystem**: \`${ecosystem}\``,
              `- **Package**: \`${dependencyNames}\``,
              `- **Update Type**: ${updateTypeRaw || 'unknown'}`,
              `- **Dependency Type**: ${dependencyType}`,
              `- **Security Severity**: ${securitySeverity || 'N/A'}`,
              `- **Breaking Change Risk**: ${breakingRisk}`,
              `- **Auto-merge Eligible**: ${autoMerge ? '✅ Yes' : '❌ No'}`
            ];

            if (!autoMerge) {
              commentLines.push('\n⚠️ This update needs manual review before merging.');
            } else {
              commentLines.push('\n✅ This update meets the auto-merge policy.');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: commentLines.join('\n')
            });

            core.setOutput('update_type', updateType);
            core.setOutput('auto_merge', autoMerge.toString());

  # Job 2: Run CI for Dependabot PRs
  dependabot-ci:
    name: 🧪 Dependabot CI
    runs-on: ubuntu-latest
    needs: dependabot-analysis
    if: github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'app/dependabot'
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: 📋 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run linting
        run: pnpm lint

      - name: 🧪 Run tests
        run: pnpm test:unit

      - name: 🏗️ Build application
        run: pnpm build

      - name: 🔒 Security audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  # Job 3: Enable auto-merge for eligible PRs
  dependabot-auto-merge:
    name: 🔄 Enable Auto-merge
    runs-on: ubuntu-latest
    needs: [dependabot-analysis, dependabot-ci]
    if: |
      (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'app/dependabot') &&
      needs.dependabot-analysis.outputs.auto_merge == 'true' &&
      needs.dependabot-ci.result == 'success'
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: read

    steps:
      - name: 🤖 Enable Auto-merge
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const qualityGateName = '🚪 Quality Gate';

            const waitForQualityGate = async () => {
              const maxAttempts = 80;
              const waitMs = 15000;

              for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                const { data } = await github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: pr.head.sha,
                  per_page: 100
                });

                const qualityGate = data.check_runs.find((checkRun) => checkRun.name === qualityGateName);

                if (!qualityGate) {
                  if (attempt < maxAttempts) {
                    console.log(
                      `Quality gate check "${qualityGateName}" not found yet (attempt ${attempt}/${maxAttempts}). Retrying in ${Math.round(waitMs / 1000)}s...`
                    );
                    await sleep(waitMs);
                    continue;
                  }

                  throw new Error(`Timed out waiting for "${qualityGateName}" check run to appear.`);
                }

                if (qualityGate.status !== 'completed') {
                  if (attempt < maxAttempts) {
                    console.log(
                      `Quality gate status=${qualityGate.status}, conclusion=${qualityGate.conclusion || 'n/a'} (attempt ${attempt}/${maxAttempts}). Retrying in ${Math.round(waitMs / 1000)}s...`
                    );
                    await sleep(waitMs);
                    continue;
                  }

                  throw new Error(`Timed out waiting for "${qualityGateName}" to complete.`);
                }

                if (qualityGate.conclusion !== 'success') {
                  throw new Error(
                    `Cannot enable auto-merge because "${qualityGateName}" concluded with "${qualityGate.conclusion}".`
                  );
                }

                console.log(`"${qualityGateName}" completed successfully.`);
                return;
              }
            };

            await waitForQualityGate();

            const getPrData = async () => {
              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number
              });
              return data;
            };

            const isDefinitelyUnmergeable = (data) => {
              const state = (data?.mergeable_state || '').toLowerCase();
              return data?.mergeable === false || state === 'dirty' || state === 'draft';
            };

            const isMergeabilityStillComputing = (data) => {
              const state = (data?.mergeable_state || '').toLowerCase();
              return data?.mergeable === null || state === 'unknown' || state === 'unstable';
            };

            const initialPrData = await getPrData();
            if (isDefinitelyUnmergeable(initialPrData)) {
              throw new Error(
                `PR not mergeable: state=${initialPrData.mergeable_state}, mergeable=${initialPrData.mergeable}`
              );
            }

            if (isMergeabilityStillComputing(initialPrData)) {
              console.log(
                `PR mergeability still computing: state=${initialPrData.mergeable_state}, mergeable=${initialPrData.mergeable}. Will retry enabling auto-merge.`
              );
            }

            // Add a comment before enabling auto-merge
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: '🤖 Enabling auto-merge for this safe dependency update. The PR will be automatically merged once all required checks pass.'
            });

            // Enable auto-merge with retry for transient 422 errors
            const enableAutoMerge = async () => {
              const mutation = `
                mutation(
                  $pullRequestId: ID!,
                  $mergeMethod: PullRequestMergeMethod!,
                  $commitHeadline: String!,
                  $commitBody: String!
                ) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: $mergeMethod,
                    commitHeadline: $commitHeadline,
                    commitBody: $commitBody
                  }) {
                    pullRequest {
                      autoMergeRequest {
                        enabledAt
                        mergeMethod
                      }
                    }
                  }
                }
              `;

              return github.graphql(mutation, {
                pullRequestId: pr.node_id,
                mergeMethod: 'SQUASH',
                commitHeadline: `${pr.title} (#${pr.number})`,
                commitBody: 'Auto-merged by Dependabot workflow after successful CI checks'
              });
            };

            const mergeDirectly = async () => {
              return github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: `${pr.title} (#${pr.number})`,
                commit_message:
                  'Merged directly by Dependabot workflow after successful CI checks (auto-merge API remained unstable).',
                sha: pr.head.sha
              });
            };

            const isRetryableAutoMergeError = (error) => {
              const message = (error?.message || '').toLowerCase();
              return (
                error?.status === 422 ||
                message.includes('unstable status') ||
                message.includes('mergeable') ||
                message.includes('not mergeable') ||
                message.includes('head branch was modified')
              );
            };

            const autoMergeAttempts = 20;
            // Retry logic for transient API failures while checks are still settling.
            let lastError;
            for (let attempt = 1; attempt <= autoMergeAttempts; attempt++) {
              try {
                const currentPrData = await getPrData();
                if (isDefinitelyUnmergeable(currentPrData)) {
                  throw new Error(
                    `PR not mergeable: state=${currentPrData.mergeable_state}, mergeable=${currentPrData.mergeable}`
                  );
                }

                await enableAutoMerge();
                console.log('✅ Auto-merge enabled successfully');

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: '✅ Auto-merge enabled! This PR will be automatically merged when all required status checks pass and any required reviews are approved.'
                });
                return; // Success, exit the script
              } catch (error) {
                lastError = error;
                const currentPrData = await getPrData();
                const mergeabilityPending = isMergeabilityStillComputing(currentPrData);
                const retryable = isRetryableAutoMergeError(error) || mergeabilityPending;

                if (retryable && attempt < autoMergeAttempts) {
                  const waitMs = 15000;
                  console.log(
                    `Attempt ${attempt}/${autoMergeAttempts} failed (${error?.status || 'no-status'}): ${error.message}. Current mergeability: state=${currentPrData.mergeable_state}, mergeable=${currentPrData.mergeable}. Retrying in ${Math.round(waitMs / 1000)}s...`
                  );
                  await sleep(waitMs);
                  continue;
                }
                break; // Non-422 error or max attempts reached
              }
            }

            // Handle final error
            let error = lastError;
            {
              const currentPrData = await getPrData();
              const mergeabilityPending = isMergeabilityStillComputing(currentPrData);
              const retryable = isRetryableAutoMergeError(error);
              const shouldTryDirectMerge = !isDefinitelyUnmergeable(currentPrData) && (retryable || mergeabilityPending);

              if (shouldTryDirectMerge) {
                console.log(
                  `⚠️ Auto-merge enablement remained unstable (state=${currentPrData.mergeable_state}, mergeable=${currentPrData.mergeable}). Attempting direct squash merge fallback.`
                );
                try {
                  await mergeDirectly();
                  console.log('✅ Direct squash merge fallback succeeded');
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: '✅ Auto-merge API remained unstable for this PR, so the workflow performed a direct squash merge after all required checks passed.'
                  });
                  return;
                } catch (mergeError) {
                  error = mergeError;
                }
              }

              console.log('❌ Failed to enable auto-merge:', error.message);

              // Provide detailed error information
              let errorMessage = '❌ Failed to enable auto-merge: ' + error.message + '\n\n**Possible reasons:**';

              if (error.status === 422) {
                errorMessage += '\n- Auto-merge is not enabled for this repository';
                errorMessage += '\n- Branch protection rules may prevent auto-merge';
                errorMessage += '\n- PR may have conflicts or failing checks';
                errorMessage += '\n- Repository settings may restrict auto-merge';
              } else if (error.status === 403) {
                errorMessage += '\n- Insufficient permissions to enable auto-merge';
                errorMessage += '\n- Repository may not allow auto-merge for this user';
              } else {
                errorMessage += '\n- Unexpected error occurred';
                errorMessage += '\n- Check repository settings and branch protection rules';
              }

              errorMessage += '\n\n**Next steps:**';
              errorMessage += '\n1. Check if auto-merge is enabled in repository settings';
              errorMessage += '\n2. Verify branch protection rules allow auto-merge';
              errorMessage += '\n3. Ensure all required status checks are configured';
              errorMessage += '\n4. Consider manual merge if auto-merge is not available';
              errorMessage += '\n\n**Manual merge:** You can safely merge this PR manually as it passed all CI checks and was identified as a safe dependency update.';

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: errorMessage
              });

              // Mark the job as failed so this doesn't look like a successful auto-merge enablement.
              throw error;
            }

  # Job 4: Notify on manual review required
  dependabot-manual-review:
    name: 📢 Manual Review Required
    runs-on: ubuntu-latest
    needs: [dependabot-analysis, dependabot-ci]
    if: |
      (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'app/dependabot') &&
      needs.dependabot-analysis.outputs.auto_merge == 'false' &&
      needs.dependabot-ci.result == 'success'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: 📢 Request manual review
        uses: actions/github-script@v8
        env:
          UPDATE_TYPE: ${{ needs.dependabot-analysis.outputs.update_type }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const updateType = process.env.UPDATE_TYPE;

            // Request review from maintainers (update with actual GitHub usernames)
            const maintainers = []; // Add actual maintainer usernames here

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: maintainers
              });
            } catch (error) {
              console.log('Could not request reviewers:', error.message);
            }

            // Add comment
            const reviewReason = updateType === 'major' ? 
              'Major version update - may contain breaking changes' :
              updateType === 'minor' ? 
              'Minor version update for production dependency - may introduce new features' :
              'Update requires manual verification';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `
              ## 👀 Manual Review Required
              
              This Dependabot PR requires manual review due to:
              - **Update Type**: ${updateType}
              - **Review Reason**: ${reviewReason}
              
              Please review the changes carefully before merging.
              
              ✅ **CI Status**: All checks passed
              
              **Recommended Actions:**
              ${updateType === 'major' ? 
                '- Review the package changelog for breaking changes\n- Test the application thoroughly\n- Update any affected code' :
                '- Review the package changelog for new features\n- Verify compatibility with existing code'
              }
              `
            });

  # Job 5: Handle CI failures
  dependabot-ci-failure:
    name: ❌ CI Failure Handler
    runs-on: ubuntu-latest
    needs: [dependabot-analysis, dependabot-ci]
    if: |
      (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'app/dependabot') &&
      needs.dependabot-ci.result == 'failure'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: ❌ Handle CI failure
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `
              ## ❌ CI Checks Failed
              
              The automated CI checks have failed for this Dependabot PR.
              
              **Next Steps:**
              1. Review the failed checks in the Actions tab
              2. Determine if the failure is related to the dependency update
              3. If it's a legitimate issue, consider:
                 - Updating the dependency manually with fixes
                 - Skipping this update temporarily
                 - Investigating compatibility issues
              
              **Workflow Run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              `
            });

            // Add failure label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['ci-failure', 'needs-investigation']
            });
